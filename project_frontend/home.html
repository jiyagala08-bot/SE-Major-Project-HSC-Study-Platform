<body>

  <h1>Task Dashboard</h1>

  <!-- Create Task Form -->
  <div id="create-task">
    <input id="task-title" placeholder="Task Title">
    <input id="task-desc" placeholder="Task Description">
    <input id="task-priority" type="number" placeholder="Priority Level (1–5)">
    <input id="task-subject" type="number" placeholder="Subject ID">

    <button onclick="handleCreateTask()">Add Task</button>
  </div>

  <hr>

  <!-- Task List -->
  <div id="task-list"></div>

  <button onclick="logoutUser()">Logout</button>

  <script src="tasks.js"></script>

  <script>
    async function handleCreateTask() {
      const title = document.getElementById("task-title").value;
      const description = document.getElementById("task-desc").value;
      const priority = document.getElementById("task-priority").value;
      const subject = document.getElementById("task-subject").value;

      if (!title || !description) {
        alert("Title and description are required");
        return;
      }

      const created = await createTask(title, description, priority, subject);

      if (created) {
        document.getElementById("task-title").value = "";
        document.getElementById("task-desc").value = "";
        document.getElementById("task-priority").value = "";
        document.getElementById("task-subject").value = "";

        loadTasks();
      }
    }

    loadTasks();
  </script>

</body>
