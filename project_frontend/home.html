<body>

  <h1>Task Dashboard</h1>
  <h3> Create A Task</h3>
  <!-- Create Task Form -->
  <input id="task-title" placeholder="Task title">
  <input id="task-description" placeholder="Task description">

<select id="task-priority">
  <option value="1">Low</option>
  <option value="2">Medium</option>
  <option value="3">High</option>
</select>

<select id="task-subject">
  <option value="1">Maths</option>
  <option value="2">English</option>
  <option value="3">Physics</option>
</select>
<div id="task-message" style="color: green;"></div>
<button type="submit" id="create-task" onclick="handleCreateTask()">Create Task</button>

  <!-- Task List -->
  <div id="task-list"></div>

  <button id="lgout" onclick="logoutUser()">Logout</button>

  <script src="auth.js"></script>
  <script src="index.js"></script>
